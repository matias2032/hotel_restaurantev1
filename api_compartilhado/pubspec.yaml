version: 1.0.0

environment:
  sdk: '>=3.10.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2
  uuid: ^4.4.0
  decimal: ^2.3.3
  http: ^1.2.0
  intl: ^0.19.0
  shared_preferences: ^2.3.0
